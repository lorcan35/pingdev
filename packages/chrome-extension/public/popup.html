<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PingOS Bridge</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 360px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 16px;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
    }
    
    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }

    .status-dot.connecting {
      background: #f59e0b;
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
    }

    .status-dot.disconnected {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.35);
    }
    
    .section {
      margin-bottom: 20px;
    }
    
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn.small {
      padding: 8px;
      font-size: 12px;
    }
    
    .tab-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 240px;
      overflow-y: auto;
    }
    
    .tab-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 6px;
      border: 1px solid #3a3a3a;
    }
    
    .tab-info {
      flex: 1;
      min-width: 0;
    }
    
    .tab-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .tab-url {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    
    .toggle {
      width: 40px;
      height: 22px;
      background: #3a3a3a;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .toggle.active {
      background: #22c55e;
    }
    
    .toggle::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    
    .toggle.active::after {
      left: 20px;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      background: #3a3a3a;
      border: 1px solid #4a4a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: #4a4a4a;
      border-color: #5a5a5a;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .info-text {
      font-size: 12px;
      color: #888;
      text-align: center;
      padding: 20px;
    }
    
    .device-id {
      font-size: 11px;
      color: #666;
      font-family: 'Courier New', monospace;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>
    <span class="status-dot" id="statusDot"></span>
    PingOS Bridge
  </h1>
  
  <div class="section">
    <div class="section-title">Shared Tabs</div>

    <div class="row">
      <button class="btn small" id="shareAllBtn">Share All</button>
      <button class="btn small" id="unshareAllBtn">Unshare All</button>
    </div>

    <div class="tab-list" id="tabList">
      <div class="info-text">Loading...</div>
    </div>
  </div>
  
  <div class="section">
    <button class="btn" id="exportBtn">Export Recorded Actions</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
